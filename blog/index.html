<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Rizznews Info</title>
    <meta name="robots" content="index, follow">
    
    <style>
        :root { --bg: #f5f7fa; --text: #333; --link: #0066cc; --card: #ffffff; }
        * { box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; line-height: 1.6; color: var(--text); background: var(--bg); margin: 0; padding: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; text-align: center; }
        .content { text-align: left; background: var(--card); padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1, h2, h3, h4, h5 { color: #111; text-align: center; margin-top: 1.5em; }
        h1 { font-size: 2.2em; margin-top: 0; }
        p, li { font-size: 1.1em; text-align: justify; margin-bottom: 1.2em; }
        a { color: var(--link); text-decoration: none; transition: 0.2s; }
        a:hover { text-decoration: underline; color: #004999; }
        img { max-width: 100%; height: auto; border-radius: 8px; display: block; margin: 30px auto; }
        ul, ol { padding-left: 20px; text-align: left; }
        header { padding: 20px 0; margin-bottom: 30px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center;}
        .lang-switcher a { margin: 0 10px; font-weight: bold; text-transform: uppercase; }
        footer { margin-top: 50px; padding: 20px 0; border-top: 1px solid #ddd; text-align: center; font-size: 0.9em; color: #666; }
        
        /* JS Blog styles */
        #post-list { display: grid; gap: 20px; text-align: left; }
        .post-card { background: var(--card); padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .post-card img { max-height: 200px; object-fit: cover; width: 100%; margin: 0 0 15px 0; border-radius: 6px; }
        .post-card h2 { margin: 0 0 10px 0; text-align: left; font-size: 1.5em;}
        .pagination { margin-top: 30px; display: flex; justify-content: center; gap: 10px; }
        .btn { padding: 10px 20px; border: none; background: var(--link); color: white; border-radius: 5px; cursor: pointer; font-size: 1em; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        
        /* Styles for Recommended Posts */
        .recommendations { margin-top: 50px; padding-top: 20px; border-top: 1px solid #ddd; text-align: left; }
        .recommendations h3 { text-align: left; margin-top: 0; }
        .recommendations ul { list-style-type: none; padding: 0; }
        .recommendations li { margin-bottom: 10px; }
        .recommendations a { font-weight: bold; }

        @media (max-width: 768px) {
            .content { padding: 20px; }
            header { flex-direction: column; gap: 15px; }
        }
    </style>
    
    <style>
        .lang-select-box { display: flex; justify-content: center; gap: 20px; margin-top: 50px; flex-wrap: wrap; }
        .lang-card { background: var(--card); padding: 30px 50px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); font-size: 1.5em; text-decoration: none; color: var(--text); transition: 0.3s; font-weight: bold; border: 2px solid transparent; }
        .lang-card:hover { border-color: var(--link); color: var(--link); transform: translateY(-5px); }
    </style>
</head>
<body>
    <div class="container">
        <header style="justify-content: center; border-bottom: none;">
            <div style="font-size: 2.5em; font-weight: bold; color: var(--text);">🌍 Blog Info</div>
        </header>
        <main style="min-height: 50vh; display: flex; flex-direction: column; justify-content: center;">
            <h1>Choose your language / Selecciona tu idioma</h1>
            <div class="lang-select-box">
                <a href="es/index.html" class="lang-card">🇪🇸 Español</a>
                <a href="pt/index.html" class="lang-card">🇧🇷 Português</a>
                <a href="tr/index.html" class="lang-card">🇹🇷 Türkçe</a>
            </div>
        </main>
        <footer style="border-top: none;">&copy; Rizznews Info - 2026 Blog Info. All rights reserved.</footer>
    </div>
</body>
</html>
